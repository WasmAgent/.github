  <text x="58" y="92" font-size="9.5" font-weight="700" fill="#065f46" letter-spacing="1.5">GATEWAY</text>
  <text x="58" y="114" font-size="15" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">wasmagent-proxy</text>
  <text x="222" y="114" font-size="11" fill="#64748b" font-style="italic"> · 🚧 in progress</text>
  <text x="58" y="134" font-size="11" fill="#475569">Proxy-Wasm (Rust) for Envoy · Istio · Kong · Consul — intercepts Agent/MCP/A2A HTTP traffic</text>
  <text x="580" y="114" font-size="11" fill="#475569">x-aep-recording-mode header · Ed25519 DSSE AEP records · validation → delta → full policy</text>
  <text x="580" y="134" font-size="11" fill="#475569">joins wasmagent-js mcp-firewall via shared trace_id for full gateway-to-tool-call causal graph</text>

