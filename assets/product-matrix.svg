<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 900" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>WasmAgent — open infrastructure for provable AI agents</title>
  <desc>WasmAgent organized as a tiered tree. Core (the platform): wasmagent-js runtime, wasmagent-protocol canonical AEP + compliance schemas, symkernel verification, agent-trust-infra trust and EU AI Act compliance, plus the planned wasmagent-py Python runtime. Official tooling (CLI, devtools, examples) and Apps (playground, desktop, editor extensions) are planned tiers reserved in the tree. Evidence surfaces extend Core and move to community maintenance once their roadmaps land: wasmagent-proxy gateway, trace-pipeline, wasmagent-train-replay. Research: fresharena. Product, reference and hub: open-agent-audit (Trustavo), bscode, and the .github org portal.</desc>

  <defs>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#e0edff"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1040" height="900" fill="#f8fafc"/>

  <!-- Title -->
  <text x="520" y="44" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">WasmAgent — open infrastructure for provable AI agents</text>
  <text x="520" y="66" text-anchor="middle" font-size="12" fill="#64748b">One question, end to end: can you prove the agent ran correctly?</text>

  <!-- ============================================================= -->
  <!-- TIER 1: CORE                                                   -->
  <!-- ============================================================= -->
  <rect x="30" y="88" width="980" height="150" rx="14" fill="url(#coreGrad)" stroke="#93c5fd" stroke-width="2"/>
  <text x="52" y="114" font-size="11" font-weight="700" fill="#1d4ed8" letter-spacing="1.5">★ CORE — THE PLATFORM</text>
  <text x="52" y="130" font-size="10.5" fill="#64748b">Evidence · Protocol · Verification · Trust — sustained, long-term investment</text>

  <!-- core cards -->
  <g filter="url(#cardShadow)">
    <rect x="52" y="142" width="222" height="80" rx="9" fill="#ffffff" stroke="#93c5fd" stroke-width="1.3"/>
    <rect x="286" y="142" width="222" height="80" rx="9" fill="#ffffff" stroke="#93c5fd" stroke-width="1.3"/>
    <rect x="520" y="142" width="222" height="80" rx="9" fill="#ffffff" stroke="#93c5fd" stroke-width="1.3"/>
    <rect x="754" y="142" width="234" height="80" rx="9" fill="#ffffff" stroke="#93c5fd" stroke-width="1.3"/>
  </g>

  <text x="66" y="164" font-size="13.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">wasmagent-js</text>
  <text x="66" y="182" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.8">RUNTIME</text>
  <text x="66" y="199" font-size="10" fill="#475569">WASM kernels · MCP gateway</text>
  <text x="66" y="213" font-size="10" fill="#475569">AEP emitter · where evidence is born</text>

  <text x="300" y="164" font-size="13.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">wasmagent-protocol</text>
  <text x="300" y="182" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.8">PROTOCOL</text>
  <text x="300" y="199" font-size="10" fill="#475569">Canonical AEP + compliance schemas</text>
  <text x="300" y="213" font-size="10" fill="#475569">npm @wasmagent/protocol · PyPI</text>

  <text x="534" y="164" font-size="13.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">symkernel</text>
  <text x="534" y="182" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.8">VERIFICATION 🚧</text>
  <text x="534" y="199" font-size="10" fill="#475569">cel-go · wazero sandbox · Z3 SMT</text>
  <text x="534" y="213" font-size="10" fill="#475569">proving it ran correctly</text>

  <text x="768" y="164" font-size="13.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">agent-trust-infra</text>
  <text x="768" y="182" font-size="10" font-weight="700" fill="#1d4ed8" letter-spacing="0.8">TRUST &amp; COMPLIANCE</text>
  <text x="768" y="199" font-size="10" fill="#475569">AgentBOM · MCP Posture · Passport</text>
  <text x="768" y="213" font-size="10" fill="#475569">EU AI Act Annex IV · 2026-08-02</text>

  <!-- planned wasmagent-py note -->
  <text x="52" y="234" font-size="9.5" fill="#64748b">📋 planned: <tspan font-family="ui-monospace,Menlo,monospace" fill="#475569">wasmagent-py</tspan> — Python runtime sibling, same AEP schema · AEP is the connective standard across Core</text>

  <!-- ============================================================= -->
  <!-- TIER 2: OFFICIAL TOOLING (planned)                             -->
  <!-- ============================================================= -->
  <rect x="30" y="256" width="980" height="58" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="52" y="280" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">🛠 OFFICIAL TOOLING</text>
  <text x="52" y="298" font-size="10.5" fill="#94a3b8">CLI · devtools · examples · starters — 📋 planned, reserved in the tree (no public repos yet)</text>

  <!-- ============================================================= -->
  <!-- TIER 3: EVIDENCE SURFACES                                      -->
  <!-- ============================================================= -->
  <rect x="30" y="330" width="980" height="128" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="52" y="356" font-size="11" font-weight="700" fill="#15803d" letter-spacing="1.5">🔌 EVIDENCE SURFACES</text>
  <text x="52" y="372" font-size="10.5" fill="#64748b">Extend Core to a surface · move to community maintenance once their roadmaps land (not retired)</text>

  <g filter="url(#cardShadow)">
    <rect x="52" y="384" width="300" height="62" rx="9" fill="#ffffff" stroke="#86efac" stroke-width="1.3"/>
    <rect x="364" y="384" width="300" height="62" rx="9" fill="#ffffff" stroke="#86efac" stroke-width="1.3"/>
    <rect x="676" y="384" width="312" height="62" rx="9" fill="#ffffff" stroke="#86efac" stroke-width="1.3"/>
  </g>

  <text x="66" y="406" font-size="12.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">wasmagent-proxy <tspan font-size="9.5" font-family="ui-sans-serif" font-weight="400" fill="#64748b">🚧</tspan></text>
  <text x="66" y="423" font-size="10" fill="#475569">Gateway — Proxy-Wasm (Rust) evidence engine</text>
  <text x="66" y="437" font-size="10" fill="#475569">Envoy · Istio · Kong — signed AEP records</text>

  <text x="378" y="406" font-size="12.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">trace-pipeline</text>
  <text x="378" y="423" font-size="10" fill="#475569">evomerge — trace-to-training backend</text>
  <text x="378" y="437" font-size="10" fill="#475569">admission gate · consumes wasmagent-protocol</text>

  <text x="690" y="406" font-size="12.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">wasmagent-train-replay <tspan font-size="9.5" font-family="ui-sans-serif" font-weight="400" fill="#64748b">🚧</tspan></text>
  <text x="690" y="423" font-size="10" fill="#475569">Causal evidence for distributed GPU training</text>
  <text x="690" y="437" font-size="10" fill="#475569">PROV-DM graph · EpochEvidenceBundle · replay</text>

  <!-- ============================================================= -->
  <!-- TIER 4: RESEARCH + PRODUCT/REFERENCE/HUB (side by side)        -->
  <!-- ============================================================= -->
  <!-- Research -->
  <rect x="30" y="474" width="318" height="128" rx="14" fill="#fdf4ff" stroke="#e9a5f5" stroke-width="2"/>
  <text x="52" y="500" font-size="11" font-weight="700" fill="#86198f" letter-spacing="1.5">🧪 RESEARCH</text>
  <text x="52" y="516" font-size="10.5" fill="#64748b">Grounds the platform in results</text>
  <g filter="url(#cardShadow)">
    <rect x="52" y="528" width="274" height="60" rx="9" fill="#ffffff" stroke="#e9a5f5" stroke-width="1.3"/>
  </g>
  <text x="66" y="550" font-size="12.5" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">fresharena</text>
  <text x="66" y="567" font-size="10" fill="#475569">Dynamic, verifiable, adversarial evaluation</text>
  <text x="66" y="581" font-size="10" fill="#475569">FAEP · submit-then-test · paper in prep</text>

  <!-- Product / reference / hub -->
  <rect x="360" y="474" width="650" height="128" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text x="382" y="500" font-size="11" font-weight="700" fill="#c2410c" letter-spacing="1.5">📦 PRODUCT · REFERENCE · HUB</text>
  <g filter="url(#cardShadow)">
    <rect x="382" y="512" width="196" height="76" rx="9" fill="#ffffff" stroke="#fdba74" stroke-width="1.3"/>
    <rect x="590" y="512" width="196" height="76" rx="9" fill="#ffffff" stroke="#fdba74" stroke-width="1.3"/>
    <rect x="798" y="512" width="190" height="76" rx="9" fill="#ffffff" stroke="#fdba74" stroke-width="1.3"/>
  </g>
  <text x="396" y="534" font-size="12" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">open-agent-audit</text>
  <text x="396" y="551" font-size="9.5" font-weight="700" fill="#c2410c">AUDIT PRODUCT</text>
  <text x="396" y="567" font-size="10" fill="#475569">Enterprise audit · AEP</text>
  <text x="396" y="581" font-size="10" fill="#475569">trustavo.com</text>

  <text x="604" y="534" font-size="12" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">bscode</text>
  <text x="604" y="551" font-size="9.5" font-weight="700" fill="#c2410c">REFERENCE WORKLOAD</text>
  <text x="604" y="567" font-size="10" fill="#475569">Coding agent on CF Workers</text>
  <text x="604" y="581" font-size="10" fill="#475569">AEP evidence export</text>

  <text x="812" y="534" font-size="12" font-weight="700" fill="#0f172a" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">.github</text>
  <text x="812" y="551" font-size="9.5" font-weight="700" fill="#c2410c">ORG HUB</text>
  <text x="812" y="567" font-size="10" fill="#475569">Portal · roadmap · RFC</text>
  <text x="812" y="581" font-size="10" fill="#475569">claims · release ledger</text>

  <!-- ============================================================= -->
  <!-- TIER 5: APPS (planned)                                         -->
  <!-- ============================================================= -->
  <rect x="30" y="618" width="980" height="58" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="52" y="642" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">🎮 APPS</text>
  <text x="52" y="660" font-size="10.5" fill="#94a3b8">playground · desktop · editor extensions · demos — 📋 planned, reserved in the tree (no public repos yet)</text>

  <!-- ============================================================= -->
  <!-- LEGEND                                                         -->
  <!-- ============================================================= -->
  <rect x="30" y="694" width="980" height="72" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="716" font-size="10.5" font-weight="700" fill="#334155">How to read this tree</text>
  <text x="52" y="734" font-size="10" fill="#475569">★ Core = sustained investment, the platform's identity   ·   🔌 Evidence surfaces → community maintenance once roadmaps land (not retired)</text>
  <text x="52" y="750" font-size="10" fill="#475569">🚧 = in progress   ·   📋 = planned (dashed tiers have no public repos yet)   ·   AEP (Agent Evidence Protocol) is the standard connecting every tier</text>

  <!-- Footer / north star -->
  <rect x="30" y="782" width="980" height="88" rx="14" fill="#0f172a"/>
  <text x="52" y="812" font-size="11" font-weight="700" fill="#93c5fd" letter-spacing="1.5">WASMAGENT PLATFORM</text>
  <text x="52" y="836" font-size="14" font-weight="700" fill="#ffffff">Open infrastructure for provable AI agents</text>
  <text x="52" y="856" font-size="10.5" fill="#cbd5e1">Runtime emits signed evidence → symkernel verifies → agent-trust-infra proves compliance → github.com/WasmAgent</text>
</svg>
